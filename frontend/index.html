<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://carbon-backend-949126109965.us-central1.run.app" crossorigin>
    <link rel="dns-prefetch" href="https://carbon-backend-949126109965.us-central1.run.app">
    <title>FIFA World Cup 2026 Operations Platform</title>
    <style>
      :root {
        --primary-color: #0d47a1;
        --secondary-color: #e3f2fd;
        --text-color: #1a1a1a;
        --bg-color: #fafafa;
        --error-color: #c62828;
        --success-color: #2e7d32;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem;
      }
      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      h1 {
        color: var(--primary-color);
        margin-bottom: 0.5rem;
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        margin-bottom: 2rem;
        border: 1px solid #e0e0e0;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #333;
      }
      input[type="number"],
      select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #b0bec5;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1rem;
        background-color: #ffffff;
        color: #1a1a1a;
        transition: border-color 0.2s;
      }
      input[type="number"]:focus-visible,
      select:focus-visible,
      button:focus-visible,
      a:focus-visible {
        outline: 3px solid #0d47a1 !important;
        outline-offset: 2px !important;
        box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.4) !important;
      }
      button {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0b3c8f;
      }
      button:disabled {
        background-color: #9e9e9e;
        cursor: not-allowed;
      }
      .alert {
        padding: 1.25rem;
        border-radius: 6px;
        margin-bottom: 1.5rem;
      }
      .alert-error {
        background-color: #ffebee;
        color: var(--error-color);
        border: 1px solid var(--error-color);
      }
      .alert-success {
        background-color: #e8f5e9;
        color: var(--success-color);
        border: 1px solid var(--success-color);
      }
      .skip-link {
        position: absolute;
        left: -10000px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
        background: var(--primary-color);
        color: white;
        font-weight: bold;
      }
      .skip-link:focus {
        position: absolute;
        left: 10px;
        top: 10px;
        width: auto;
        height: auto;
        overflow: visible;
        padding: 0.5rem 1rem;
        z-index: 999;
        outline: 3px solid #0d47a1;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      th, td {
        padding: 0.75rem;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
      }
      th {
        background-color: var(--secondary-color);
        color: var(--primary-color);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
