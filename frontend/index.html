<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://carbon-backend-949126109965.us-central1.run.app" crossorigin>
    <link rel="dns-prefetch" href="https://carbon-backend-949126109965.us-central1.run.app">
    <title>Carbon Footprint Awareness Platform</title>
    <style>
      :root {
        --primary-color: #2e7d32;
        --secondary-color: #c8e6c9;
        --text-color: #333333;
        --bg-color: #f5f5f5;
        --error-color: #d32f2f;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        line-height: 1.6;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      h1 {
        color: var(--primary-color);
      }
      .card {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        margin-bottom: 2rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
      }
      input[type="number"] {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }
      button:hover {
        background-color: #1b5e20;
      }
      button:disabled {
        background-color: #9e9e9e;
        cursor: not-allowed;
      }
      .alert {
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1rem;
      }
      .alert-error {
        background-color: #ffebee;
        color: var(--error-color);
        border: 1px solid var(--error-color);
      }
      .alert-success {
        background-color: var(--secondary-color);
        color: var(--primary-color);
        border: 1px solid var(--primary-color);
      }
      .dashboard-stat {
        display: flex;
        justify-content: space-between;
        padding: 1rem 0;
        border-bottom: 1px solid #eee;
      }
      .skip-link {
        position: absolute;
        left: -10000px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
        background: var(--primary-color);
        color: white;
        font-weight: bold;
      }
      .skip-link:focus {
        position: block;
        width: auto;
        height: auto;
        overflow: visible;
        padding: 0.5rem 1rem;
        outline: 2px solid var(--primary-color);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
